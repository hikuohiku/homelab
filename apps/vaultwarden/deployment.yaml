apiVersion: apps/v1
kind: Deployment
metadata:
  name: vaultwarden
  namespace: vaultwarden
  labels:
    app: vaultwarden
spec:
  replicas: 1
  # SQLite は単一ファイル DB。RWO PVC を複数 Pod で同時マウントさせないよう
  # Recreate にして rolling 中の二重起動を防ぐ。
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vaultwarden
  template:
    metadata:
      labels:
        app: vaultwarden
    spec:
      securityContext:
        # /data の所有権を揃える。下の runAsUser と合わせる。
        fsGroup: 1000
      initContainers:
        # local-path の PVC は root:root で作成されるため、非 root 実行に備えて所有権を調整
        - name: init-permissions
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 1000:1000 /data"]
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: data
              mountPath: /data
      containers:
        - name: vaultwarden
          # latest ではなく具体的なバージョンに pin (最新安定版 1.36.0 / alpine variant)
          image: vaultwarden/server:1.36.0-alpine
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
          env:
            # 公開 URL。/admin の origin 検証や WebAuthn/メール内リンクに使用
            - name: DOMAIN
              value: https://vaultwarden.tailae6c2.ts.net
            # 既存ユーザー移行のため新規サインアップは閉じる
            - name: SIGNUPS_ALLOWED
              value: "false"
            # vaultwarden は ROCKET_PORT のデフォルトが 80。明示しておく
            - name: ROCKET_PORT
              value: "80"
            # WebSocket 通知 (リアルタイム同期) は 1.x 系で HTTP ポートに統合済みのため
            # 別ポート/別 env (WEBSOCKET_ENABLED) は不要。Ingress も 80 だけで完結する。
            - name: ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: vaultwarden-admin-token
                  key: ADMIN_TOKEN
          ports:
            - name: http
              containerPort: 80
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /alive
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /alive
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: vaultwarden-data
