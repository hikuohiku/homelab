apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: agent-rbac
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/hikuohiku/homelab.git
    targetRevision: HEAD
    path: apps/agent-rbac

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
